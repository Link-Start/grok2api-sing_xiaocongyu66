name: grok2api

services:
  grok2api:
    container_name: grok2api
    image: "${GROK2API_IMAGE:-ghcr.io/chenyme/grok2api:latest}"
    ports:
      - "${GROK2API_PORT:-8000}:8000"
    environment:
      TZ: "${TZ:-Asia/Shanghai}"
    volumes:
      - "${GROK2API_CONFIG:-./config.yaml}:/run/grok2api/config.yaml:ro"
      - grok2api-data:/app/data
    restart: unless-stopped
    init: true
    stop_grace_period: 30s
    security_opt:
      - no-new-privileges:true

  # 防封叠加（WARP + Privoxy + FlareSolverr，对齐 jiujiu532/grok2api）：
  #   docker compose -f docker-compose.yml -f docker-compose.anti-bot.yml up -d
  # 然后：
  #   1) 管理端「设置 → Grok Web」启用 FlareSolverr，地址 http://flaresolverr:8191
  #   2) 「出口代理」新增 socks5://warp:1080 或 http://privoxy:8118（Web/Console 作用域）
  # 如果只想用 WARP，可取消以下注释：
  # warp:
  #   container_name: warp
  #   image: caomingjun/warp:latest
  #   restart: unless-stopped
  #   ports:
  #     - "127.0.0.1:1080:1080"
  #   environment:
  #     - WARP_SLEEP=2
  #   cap_add:
  #     - NET_ADMIN

volumes:
  grok2api-data:
